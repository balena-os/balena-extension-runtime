    - subject: "balena-extension-runtime: do not error if proxy is already gone"
      hash: f2e13e974336b17ab02b052c8e1518bb97876db0
      body: |
        Tolerate the proxy already being gone: between create and start the
        shim can crash, the OOM killer can fire, or an operator can SIGKILL
        the proxy directly.

        Mirror the tolerance Kill already applied for SIGTERM/SIGKILL. The
        state write above has already recorded the intended terminal state,
        so the missing process is informational.
      footer:
        Change-type: patch
        change-type: patch
        Signed-off-by: Alex Gonzalez <alexg@balena.io>
        signed-off-by: Alex Gonzalez <alexg@balena.io>
      author: Alex Gonzalez
      nested: []
    - subject: "balena-extension-runtime: persist the terminal state before signaling
        the proxy"
      hash: 5b8a8117c4b678c01f8cecdd00cc80447607f18b
      body: >
        If the order were reversed and WriteState failed, the proxy would have

        already exited while state still claimed "created" — leaving soft-delete

        blocked by its state-guard until --force.


        With this ordering, a failed proxy signal leaves a stale process the
        next

        force-delete or reboot reaps, which is the cheaper failure mode

        as XDG_RUNTIME_DIR is tmpfs.
      footer:
        Change-type: patch
        change-type: patch
        Signed-off-by: Alex Gonzalez <alexg@balena.io>
        signed-off-by: Alex Gonzalez <alexg@balena.io>
      author: Alex Gonzalez
      nested: []
