    - subject: "create_test: assert that a failing create does not write state"
      hash: 4ab6667d1e4d21bb2d5b1b2a17017e935dc541f1
      body: >
        TestCreate_HookFailure_NoProxySpawned asserts that a failing
        hooks/create

        short-circuits Create before the proxy is spawned and before any state
        is

        written. A regression that ran the hook after spawn would leak a proxy

        process; one that wrote state before the hook ran would leave a Created

        container with no live proxy.
      footer:
        Change-type: patch
        change-type: patch
        Signed-off-by: Alex Gonzalez <alexg@balena.io>
        signed-off-by: Alex Gonzalez <alexg@balena.io>
      author: Alex Gonzalez
      nested: []
